; 3D FarmLab — ESP32-C3 Super Mini status light.
; Build:  pio run          (from this directory)
;
; The single .ino in this directory is compiled directly (src_dir = .), so no
; manual "copy status-light.ino to src/main.cpp" step is needed — the sketch
; already declares all its function prototypes up front, which is all the
; Arduino builder's auto-prototype generation would have added.
;
; The post-build script merges bootloader + partitions + boot_app0 + app into a
; single image flashable at offset 0x0 and writes it to
; ../../public/firmware/status-light.bin, which both the standalone web flasher
; here and the 3D-FarmLab dashboard's flasher serve (see
; scripts/merge_firmware.py and public/firmware/manifest.json).

[platformio]
src_dir = .

[env:esp32c3]
platform = espressif32@^6.7.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    ; Route Serial to the C3's native USB CDC so the same USB port used for
    ; flashing also carries the provisioning JSON protocol. Without CDC_ON_BOOT
    ; the browser never sees any serial output from the device.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ; The MQTT client (esp-mqtt) and the public-CA bundle (esp_crt_bundle) are
    ; part of the ESP-IDF bundled with the Arduino-ESP32 core — no extra deps.
    bblanchon/ArduinoJson@^7.0.4
extra_scripts = post:scripts/merge_firmware.py
